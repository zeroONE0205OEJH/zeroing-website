<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Company | 株式会社zeroONE</title>
    <style>
        /* --- 全体設定 --- */
        body { 
            background-color: #111111; 
            color: #ffffff; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            margin: 0; padding: 0; line-height: 1.6; 
        }
        
        /* --- 背景動画エリア --- */
        #video-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -2; overflow: hidden;
            /* 動画が消えた時のための背景画像（予備） */
            background: url('https://images.pexels.com/photos/3183150/pexels-photo-3183150.jpeg?auto=compress&cs=tinysrgb&w=1920') no-repeat center center/cover;
        }
        .bg-video {
            position: absolute; top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.7); z-index: -1; pointer-events: none;
        }
        
        /* --- ヘッダー --- */
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background-color: rgba(17, 17, 17, 0.95); border-bottom: 1px solid #333333; position: fixed; top: 0; width: 100%; box-sizing: border-box; z-index: 1000; backdrop-filter: blur(5px); }
        .logo svg { height: 60px; width: auto; }
        nav ul { list-style: none; margin: 0; padding: 0; display: flex; gap: 30px; }
        nav a { color: #cccccc; text-decoration: none; font-size: 14px; transition: 0.3s; font-weight: bold; }
        nav a:hover { color: #ffffff; }

        .hamburger { display: none; cursor: pointer; flex-direction: column; gap: 6px; z-index: 1001; }
        .hamburger span { display: block; width: 25px; height: 2px; background-color: #ffffff; transition: 0.3s; }

        /* --- コンテナ設定 --- */
        .container { 
            max-width: 1000px; 
            margin: 140px auto 80px; 
            padding: 60px 40px; 
            background: rgba(25, 25, 25, 0.5); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border-radius: 12px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }
        .section-title { text-align: center; font-size: 32px; letter-spacing: 4px; margin-bottom: 60px; }
        
        /* --- 会社概要テーブル --- */
        .info-table { width: 100%; border-collapse: collapse; }
        .info-table th, .info-table td { padding: 25px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: left; vertical-align: top; }
        .info-table tr:last-child th, .info-table tr:last-child td { border-bottom: none; }
        .info-table th { width: 30%; color: #888; font-weight: normal; font-size: 14px; }
        .info-table td { font-size: 16px; color: #eee; line-height: 1.8; }

        footer { padding: 80px 20px 40px; text-align: center; background: #0a0a0a; position: relative; }
        .copyright { color: #555; font-size: 14px; margin-top: 20px; }

        @media (max-width: 900px) {
            .container { margin: 100px 20px 60px; padding: 40px 20px; }
            .info-table th, .info-table td { display: block; width: 100%; padding: 15px 10px; }
        }
    </style>
</head>
<body>
    
    <div id="video-container">
        <video class="bg-video" autoplay loop muted playsinline poster="https://images.pexels.com/photos/3183150/pexels-photo-3183150.jpeg?auto=compress&cs=tinysrgb&w=1920">
            <source src="https://videos.pexels.com/video-files/3195394/3195394-hd_1920_1080_25fps.mp4" type="video/mp4">
        </video>
    </div>
    <div class="bg-overlay"></div>

    <header>
        <div class="logo">
            <a href="index.html">
                <svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
                  <defs><mask id="cutout-header"><rect x="0" y="0" width="200" height="150" fill="white" /><rect x="90" y="5" width="20" height="90" fill="black" /><polygon points="65,30 90,5 90,30" fill="black" /></mask></defs>
                  <ellipse cx="100" cy="50" rx="35" ry="45" fill="#ffffff" mask="url(#cutout-header)" />
                  <text x="100" y="130" font-family="'Helvetica Neue', Arial, sans-serif" text-anchor="middle" font-size="28" letter-spacing="-0.5"><tspan font-weight="400" fill="#ffffff">zero</tspan><tspan font-weight="800" fill="#ffffff">ONE</tspan></text>
                </svg>
            </a>
        </div>
        <div class="hamburger"><span></span><span></span><span></span></div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="service.html">Service</a></li>
                <li><a href="company.html">Company</a></li>
                <li><a href="recruit.html">Recruit</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <h2 class="section-title">COMPANY</h2>
        <table class="info-table">
            <tr><th>会社名</th><td>株式会社zeroONE</td></tr>
            <tr><th>代表者</th><td>代表取締役 大八木 航輝</td></tr>
            <tr><th>設立</th><td>2024年8月23日</td></tr>
            <tr><th>所在地</th><td>〒252-0216 神奈川県相模原市中央区清新6-10-21-415</td></tr>
            <tr><th>電話番号</th><td>070-1437-8545</td></tr>
            <tr><th>メールアドレス</th><td>syk.zeroone@gmail.com</td></tr>
            <tr><th>事業内容</th>
                <td>
                    軽貨物運送事業<br>
                    Amazon 2.0 オフィシャルパートナー<br>
                    動画編集・コンテンツ制作事業<br>
                    アパレル事業
                </td>
            </tr>
        </table>
    </div>

    <footer>
        <div class="copyright">&copy; 2024 zeroONE Inc. All Rights Reserved.</div>
    </footer>

    <script>
        // iPad Safari 強制再生スクリプト
        window.addEventListener('load', function() {
            var video = document.querySelector('.bg-video');
            if (video) {
                video.play().catch(function() {
                    // 自動再生が拒否された場合、画面タッチで再生開始
                    document.body.addEventListener('touchstart', function() {
                        video.play();
                    }, {once: true});
                });
            }
        });

        const hamburger = document.querySelector('.hamburger');
        const navUl = document.querySelector('nav ul');
        hamburger.addEventListener('click', () => { 
            hamburger.classList.toggle('active'); 
            navUl.classList.toggle('active'); 
        });
    </script>
</body>
</html>
