<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | 株式会社zeroONE</title>
    <style>
        body { background-color: #111111; color: #ffffff; font-family: sans-serif; margin: 0; padding: 0; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background-color: #1a1a1a; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000; }
        .logo svg { height: 60px; }
        nav ul { list-style: none; display: flex; gap: 30px; margin: 0; padding: 0; }
        nav a { color: #ccc; text-decoration: none; font-size: 14px; font-weight: bold; }
        .container { max-width: 800px; margin: 0 auto; padding: 80px 20px; }
        .section-title { text-align: center; font-size: 32px; letter-spacing: 4px; margin-bottom: 40px; }
        .contact-form { background: #1a1a1a; padding: 40px; border-radius: 8px; border: 1px solid #333; }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 10px; color: #888; font-size: 14px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 15px; background: #222; border: 1px solid #444; color: #fff; border-radius: 4px; box-sizing: border-box; font-family: inherit; }
        .submit-btn { width: 100%; padding: 18px; background: #fff; color: #000; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; transition: 0.3s; }
        .submit-btn:hover { background: #ccc; }
        footer { padding: 80px 20px; text-align: center; background: #0a0a0a; border-top: 1px solid #222; }
        .footer-links { display: flex; justify-content: center; gap: 30px; margin-bottom: 40px; }
        .footer-links a { color: #888; text-decoration: none; }
        @media (max-width: 900px) { header { padding: 15px 20px; } .logo svg { height: 45px; } .contact-form { padding: 20px; } }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
              <defs><mask id="cutout-header"><rect x="0" y="0" width="200" height="150" fill="white" /><rect x="90" y="5" width="20" height="90" fill="black" /><polygon points="65,30 90,5 90,30" fill="black" /></mask></defs>
              <ellipse cx="100" cy="50" rx="35" ry="45" fill="#ffffff" mask="url(#cutout-header)" />
              <text x="100" y="130" font-family="sans-serif" text-anchor="middle" font-size="28"><tspan font-weight="400" fill="#ffffff">zero</tspan><tspan font-weight="800" fill="#ffffff">ONE</tspan></text>
            </svg>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="service.html">Service</a></li>
                <li><a href="company.html">Company</a></li>
                <li><a href="recruit.html">Recruit</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
    <div class="container">
        <h2 class="section-title">CONTACT</h2>
        <div class="contact-form">
            <form action="https://formspree.io/f/xwvaejje" method="POST">
                <div class="form-group">
                    <label>お問い合わせ内容の選択</label>
                    <select name="件名" required>
                        <option value="" disabled selected>選択してください</option>
                        <option value="配送・お見積りのご相談">配送・お見積りのご相談（Amazon 2.0等）</option>
                        <option value="映像制作に関するご相談">映像制作に関するご相談</option>
                        <option value="アパレルに関するお問い合わせ">アパレルに関するお問い合わせ</option>
                        <option value="求人・採用へのご応募">求人・採用へのご応募</option>
                        <option value="その他のお問い合わせ">その他のお問い合わせ</option>
                    </select>
                </div>
                <div class="form-group"><label>会社名</label><input type="text" name="会社名"></div>
                <div class="form-group"><label>お名前</label><input type="text" name="お名前" required></div>
                <div class="form-group"><label>メールアドレス</label><input type="email" name="email" required></div>
                <div class="form-group"><label>詳しいお問い合わせ内容</label><textarea name="メッセージ" rows="6" required></textarea></div>
                <button type="submit" class="submit-btn">送信する</button>
            </form>
        </div>
    </div>
    <footer>
        <div class="footer-links">
            <a href="index.html">Home</a>
            <a href="service.html">Service</a>
            <a href="company.html">Company</a>
            <a href="recruit.html">Recruit</a>
            <a href="contact.html">Contact</a>
        </div>
        <div style="color:#555;">&copy; 2024 zeroONE Inc.</div>
    </footer>
</body>
</html>
