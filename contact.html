<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | 株式会社zeroONE</title>
    <style>
        body { background-color: #111111; color: #ffffff; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 0; line-height: 1.6; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background-color: rgba(26, 26, 26, 0.95); border-bottom: 1px solid #333333; position: sticky; top: 0; z-index: 1000; }
        .logo svg { height: 60px; width: auto; }
        nav ul { list-style: none; margin: 0; padding: 0; display: flex; gap: 30px; }
        nav a { color: #cccccc; text-decoration: none; font-size: 14px; transition: 0.3s; }
        nav a:hover { color: #ffffff; }
        .container { max-width: 1200px; margin: 0 auto; padding: 80px 20px; }
        .section-title { text-align: center; font-size: 32px; letter-spacing: 4px; margin-bottom: 20px; }
        .section-desc { text-align: center; color: #aaa; margin-bottom: 60px; font-size: 15px; }
        .contact-form { max-width: 700px; margin: 0 auto; background: #1a1a1a; padding: 50px; border-radius: 8px; border: 1px solid #333; }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 8px; color: #ccc; font-size: 14px; }
        .form-group input, .form-group textarea { width: 100%; padding: 15px; background: #222; border: 1px solid #444; color: #fff; border-radius: 4px; box-sizing: border-box; font-family: inherit; }
        .submit-btn { display: block; width: 100%; padding: 18px; background: #fff; color: #000; font-weight: bold; font-size: 16px; border: none; border-radius: 4px; cursor: pointer; transition: 0.3s; }
        .submit-btn:hover { background: #cccccc; }
        footer { padding: 100px 20px 40px; text-align: center; border-top: 1px solid #222; background: #0a0a0a; display: flex; flex-direction: column; align-items: center; gap: 40px; }
        .footer-logo svg { height: 80px; width: auto; } 
        .footer-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; }
        .footer-links a { color: #888; text-decoration: none; font-size: 16px; transition: 0.3s; } 
        .footer-links a:hover { color: #fff; }
        .copyright { color: #555; font-size: 14px; margin-top: 20px; }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <a href="index.html">
                <svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
                  <ellipse cx="100" cy="50" rx="35" ry="45" fill="#ffffff" />
                  <text x="100" y="130" font-family="sans-serif" text-anchor="middle" font-size="28" fill="#fff">zeroONE</text>
                </svg>
            </a>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="service.html">Service</a></li>
                <li><a href="company.html">Company</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <h2 class="section-title">CONTACT</h2>
        <p class="section-desc">配送に関するご相談・お見積りなど、お気軽にお問い合わせください。</p>
        <div class="contact-form">
            <form action="https://formspree.io/f/xwvaejje" method="POST">
                <div class="form-group"><label>会社名</label><input type="text" name="会社名"></div>
                <div class="form-group"><label>お名前 ※必須</label><input type="text" name="お名前" required></div>
                <div class="form-group"><label>メールアドレス ※必須</label><input type="email" name="email" required></div>
                <div class="form-group"><label>お問い合わせ内容 ※必須</label><textarea name="メッセージ" rows="8" required></textarea></div>
                <button type="submit" class="submit-btn">送信する</button>
            </form>
        </div>
    </div>

    <footer>
        <div class="footer-logo">
            <a href="index.html">
                <svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
                  <ellipse cx="100" cy="50" rx="35" ry="45" fill="#ffffff" />
                  <text x="100" y="130" font-family="sans-serif" text-anchor="middle" font-size="28" fill="#fff">zeroONE</text>
                </svg>
            </a>
        </div>
        <div class="footer-links">
            <a href="index.html">Home</a>
            <a href="service.html">Service</a>
            <a href="company.html">Company</a>
            <a href="privacy.html">Privacy Policy</a>
        </div>
        <div class="copyright">&copy; 2024 zeroONE Inc. All Rights Reserved.</div>
    </footer>
</body>
</html>
