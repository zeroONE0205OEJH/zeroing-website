<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | 株式会社zeroONE</title>
    <style>
        /* --- 全体設定 --- */
        body { background-color: #0a0a0a; color: #ffffff; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 0; line-height: 1.6; overflow-x: hidden; }
        
        /* --- ヘッダー --- */
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background-color: rgba(10, 10, 10, 0.95); border-bottom: 1px solid #222; position: fixed; top: 0; width: 100%; box-sizing: border-box; z-index: 9999; backdrop-filter: blur(10px); }
        
        /* ★ロゴ画像の設定（サイズを約2倍に・反転・透過） */
        .logo a { display: flex; align-items: center; text-decoration: none; }
        .logo img { 
            height: 120px; 
            width: auto; 
            display: block; 
            filter: invert(1); 
            mix-blend-mode: screen; 
        }
        
        /* PC用ナビゲーション */
        nav.pc-nav ul { list-style: none; margin: 0; padding: 0; display: flex; gap: 30px; }
        nav.pc-nav a { color: #888; text-decoration: none; font-size: 14px; transition: 0.3s; font-weight: bold; }
        nav.pc-nav a:hover { color: #fff; }

        /* ハンバーガーボタン（右上に絶対配置） */
        .hamburger { display: none; cursor: pointer; flex-direction: column; gap: 6px; z-index: 10000; position: absolute; right: 25px; top: 50%; transform: translateY(-50%); }
        .hamburger span { display: block; width: 30px; height: 2px; background-color: #ffffff; transition: 0.4s; }

        /* スマホ用 全画面中央メニュー */
        .mobile-menu {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(10, 10, 10, 0.98); display: flex; justify-content: center; align-items: center;
            z-index: 9998; opacity: 0; pointer-events: none; transition: 0.4s;
        }
        .mobile-menu.active { opacity: 1; pointer-events: auto; }
        .mobile-menu ul { list-style: none; padding: 0; text-align: center; }
        .mobile-menu li { margin: 30px 0; }
        .mobile-menu a { color: #fff; text-decoration: none; font-size: 26px; font-weight: bold; letter-spacing: 4px; transition: 0.3s; }

        /* --- コンテンツ --- */
        .container { max-width: 800px; margin: 150px auto 100px; padding: 0 20px; }
        .section-title { text-align: center; font-size: 32px; letter-spacing: 4px; margin-bottom: 60px; font-weight: 300; }

        /* --- フォームスタイル --- */
        .contact-form { background: rgba(20, 20, 20, 0.5); padding: 50px; border-radius: 12px; border: 1px solid #222; }
        .form-group { margin-bottom: 30px; }
        .form-group label { display: block; color: #888; font-size: 14px; margin-bottom: 10px; letter-spacing: 1px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 15px; background-color: #111; border: 1px solid #333; color: #fff; border-radius: 6px; font-size: 16px; box-sizing: border-box; transition: 0.3s; }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: #fff; outline: none; background-color: #151515; }
        .form-group textarea { height: 200px; resize: vertical; }
        
        /* 必須・任意のバッジ */
        .badge-req { background-color: #444; color: #fff; font-size: 11px; padding: 3px 8px; border-radius: 4px; margin-left: 8px; vertical-align: middle; }
        .badge-opt { background-color: #222; color: #888; font-size: 11px; padding: 3px 8px; border-radius: 4px; margin-left: 8px; vertical-align: middle; border: 1px solid #333; }

        /* セレクトボックスの矢印カスタム */
        .form-group select { appearance: none; -webkit-appearance: none; background-image: url('data:image/svg+xml;charset=UTF-8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>'); background-repeat: no-repeat; background-position: right 15px center; background-size: 18px; }

        /* プライバシーポリシーのチェックボックス専用スタイル */
        .checkbox-group { display: flex; align-items: center; gap: 12px; margin: 40px 0; }
        .checkbox-group input[type="checkbox"] { width: 22px; height: 22px; margin: 0; cursor: pointer; flex-shrink: 0; appearance: auto; -webkit-appearance: auto; }
        .checkbox-group label { color: #ccc; font-size: 15px; cursor: pointer; margin: 0; display: flex; align-items: center; }
        .checkbox-group a { color: #fff; text-decoration: underline; transition: 0.3s; }
        .checkbox-group a:hover { color: #888; }

        .submit-btn { display: block; width: 100%; padding: 20px; background-color: #fff; color: #000; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; letter-spacing: 2px; }
        .submit-btn:hover { background-color: #ccc; }

        /* --- フッター（完全統一版） --- */
        footer { padding: 100px 20px 40px; text-align: center; border-top: 1px solid #222; background: #0a0a0a; display: flex; flex-direction: column; align-items: center; gap: 40px; }
        .footer-logo img { 
            height: 120px; 
            width: auto; 
            filter: invert(1); 
            mix-blend-mode: screen; 
        } 
        .footer-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; }
        .footer-links a { color: #888; text-decoration: none; font-size: 16px; transition: 0.3s; } 
        .footer-links a:hover { color: #fff; }
        .copyright { color: #444; font-size: 13px; margin-top: 20px; }

        /* --- レスポンシブ設定（スマホ用） --- */
        @media (max-width: 900px) {
            header { padding: 15px 20px; }
            .logo img { height: 80px; } /* スマホ用ロゴも拡大 */

            /* PCメニューを隠す */
            nav.pc-nav { display: none; }

            /* ハンバーガーボタンを表示 */
            .hamburger { display: flex; }
            
            /* 3本線が「×」になるアニメーション */
            .hamburger.active span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
            .hamburger.active span:nth-child(2) { opacity: 0; }
            .hamburger.active span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

            .container { margin-top: 100px; }
            .contact-form { padding: 30px 20px; }
            .section-title { font-size: 26px; margin-bottom: 40px; }

            .footer-logo img { height: 80px; }
        }
    </style>
</head>
<body>
    
    <header>
        <div class="logo">
            <a href="index.html">
                <img src="logo.png" alt="株式会社zeroONE">
            </a>
        </div>

        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <nav class="pc-nav">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="service.html">Service</a></li>
                <li><a href="company.html">Company</a></li>
                <li><a href="recruit.html">Recruit</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <div class="mobile-menu" id="mobile-menu">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="service.html">Service</a></li>
            <li><a href="company.html">Company</a></li>
            <li><a href="recruit.html">Recruit</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </div>

    <div class="container">
        <h1 class="section-title">CONTACT</h1>
        
        <form class="contact-form" action="https://formspree.io/f/あなたのフォームID" method="POST">
            
            <div class="form-group">
                <label>お問い合わせ内容の選択 <span class="badge-req">必須</span></label>
                <select name="問い合わせ種別" required>
                    <option value="" disabled selected>選択してください</option>
                    <option value="配送に関するご相談">配送に関するご相談</option>
                    <option value="動画編集に関するご相談">動画編集に関するご相談</option>
                    <option value="アパレルに関するお問い合わせ">アパレルに関するお問い合わせ</option>
                    <option value="採用について">採用について</option>
                    <option value="その他">その他</option>
                </select>
            </div>

            <div class="form-group">
                <label>貴社名 <span class="badge-opt">任意</span> <span style="font-size:12px; color:#666; margin-left:5px;">※法人のお客様はご記入ください</span></label>
                <input type="text" name="貴社名">
            </div>

            <div class="form-group">
                <label>部署名 <span class="badge-opt">任意</span></label>
                <input type="text" name="部署名">
            </div>

            <div class="form-group">
                <label>お名前 <span class="badge-req">必須</span></label>
                <input type="text" name="お名前" required>
            </div>

            <div class="form-group">
                <label>メールアドレス <span class="badge-req">必須</span></label>
                <input type="email" name="email" required>
            </div>

            <div class="form-group">
                <label>電話番号 <span class="badge-req">必須</span></label>
                <input type="tel" name="電話番号" required>
            </div>

            <div class="form-group">
                <label>詳しいお問い合わせ内容 <span class="badge-req">必須</span></label>
                <textarea name="メッセージ" required></textarea>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" name="個人情報の取り扱い同意" id="privacy-check" required>
                <label for="privacy-check">
                    <a href="privacy.html" target="_blank">プライバシーポリシー</a>に同意する <span class="badge-req">必須</span>
                </label>
            </div>

            <button type="submit" class="submit-btn">送信する</button>
        </form>
    </div>

    <footer>
        <div class="footer-logo">
            <a href="index.html">
                <img src="logo.png" alt="zeroONE">
            </a>
        </div>
        <div class="footer-links">
            <a href="index.html">Home</a>
            <a href="service.html">Service</a>
            <a href="company.html">Company</a>
            <a href="recruit.html">Recruit</a>
            <a href="contact.html">Contact</a>
            <a href="privacy.html">Privacy Policy</a>
        </div>
        <div class="copyright">&copy; 2024 zeroONE Inc. All Rights Reserved.</div>
    </footer>

    <script>
        // ★ メニューの開閉と背景のスクロールロック制御
        const hamburger = document.getElementById('hamburger');
        const mobileMenu = document.getElementById('mobile-menu');

        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            mobileMenu.classList.toggle('active');
            document.body.style.overflow = mobileMenu.classList.contains('active') ? 'hidden' : '';
        });
    </script>
</body>
</html>
