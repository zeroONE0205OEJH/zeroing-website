<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ | 株式会社zeroONE</title>
    <style>
        /* 共通デザイン */
        body { background-color: #111111; color: #ffffff; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 0; line-height: 1.6; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background-color: rgba(26, 26, 26, 0.95); border-bottom: 1px solid #333333; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 24px; font-weight: bold; letter-spacing: 2px; }
        .logo a { color: #fff; text-decoration: none; }
        nav ul { list-style: none; margin: 0; padding: 0; display: flex; gap: 30px; }
        nav a { color: #cccccc; text-decoration: none; font-size: 14px; }
        .container { max-width: 1000px; margin: 0 auto; padding: 80px 20px; }
        .section-title { text-align: center; font-size: 28px; letter-spacing: 2px; margin-bottom: 50px; position: relative; }
        .section-title::after { content: ""; display: block; width: 40px; height: 2px; background: #ffffff; margin: 15px auto 0; }
        
        /* フォームデザイン */
        .contact-form { max-width: 650px; margin: 0 auto; text-align: left; background: #1a1a1a; padding: 40px; border-radius: 8px; border: 1px solid #333; }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 14px; color: #cccccc; }
        .req-label { background: #aa3333; color: #fff; font-size: 11px; padding: 3px 6px; border-radius: 3px; margin-left: 10px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; background: #111111; border: 1px solid #444; color: #ffffff; border-radius: 4px; box-sizing: border-box; }
        .submit-btn { width: 100%; padding: 18px; background: #ffffff; color: #000000; border: none; font-weight: bold; border-radius: 4px; cursor: pointer; transition: 0.3s; }
        .submit-btn:hover { background: #cccccc; }
        
        footer { padding: 60px 20px 20px 20px; text-align: center; border-top: 1px solid #222; background: #0a0a0a; }
        .footer-links a { color: #888; text-decoration: none; font-size: 13px; margin: 0 15px; }
        .copyright { color: #555; font-size: 12px; }
    </style>
</head>
<body>
    <header>
        <div class="logo"><a href="index.html">zeroONE</a></div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="service.html">Service</a></li>
                <li><a href="company.html">Company</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <h2 class="section-title">Contact</h2>
        <div class="contact-form">
            <form action="https://formspree.io/f/xwvaejje" method="POST">
                <input type="hidden" name="_next" value="https://zeroone0205oejh.github.io/zeroing-website/thanks.html">
                <div class="form-group"><label>貴社名 <span class="req-label">必須</span></label><input type="text" name="貴社名" required></div>
                <div class="form-group"><label>お名前 <span class="req-label">必須</span></label><input type="text" name="お名前" required></div>
                <div class="form-group"><label>メールアドレス <span class="req-label">必須</span></label><input type="email" name="メールアドレス" required></div>
                <div class="form-group"><label>お問い合わせ内容 <span class="req-label">必須</span></label><textarea name="お問い合わせ内容" required></textarea></div>
                <button type="submit" class="submit-btn">送信する</button>
            </form>
        </div>
    </div>

    <footer>
        <div class="footer-links">
            <a href="index.html">Home</a>
            <a href="service.html">事業内容</a>
            <a href="company.html">会社概要</a>
            <a href="privacy.html">個人情報保護方針</a>
        </div>
        <p class="copyright">&copy; 2026 zeroONE Inc. All Rights Reserved.</p>
    </footer>
</body>
</html>
