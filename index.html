<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>株式会社zeroONE | Amazon DSP 2.0 オフィシャルパートナー</title>
    <style>
        /* サイト全体の基本設定 */
        body {
            background-color: #111111;
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* メニュー（ヘッダー）のデザイン */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background-color: #1a1a1a;
            border-bottom: 1px solid #333333;
            position: sticky; /* スクロールしても上に固定 */
            top: 0;
            z-index: 100;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
        }
        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 30px;
        }
        nav a {
            color: #cccccc;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }
        nav a:hover {
            color: #ffffff;
        }

        /* メインコンテンツの外枠 */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 80px 20px;
        }

        /* 中央のメッセージ部分 */
        .hero {
            text-align: center;
            margin-bottom: 100px;
        }
        .hero h1 {
            letter-spacing: 2px;
            font-size: 42px;
            margin-bottom: 20px;
        }
        .hero .catchphrase {
            color: #cccccc;
            font-size: 18px;
        }

        /* 会社概要セクション */
        .company-section {
            margin-top: 60px;
        }
        .section-title {
            text-align: center;
            font-size: 28px;
            letter-spacing: 2px;
            margin-bottom: 40px;
            position: relative;
        }
        .section-title::after {
            content: "";
            display: block;
            width: 50px;
            height: 2px;
            background: #ffffff;
            margin: 15px auto 0;
        }
        .company-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .company-table th, .company-table td {
            padding: 20px;
            border-bottom: 1px solid #333333;
        }
        .company-table th {
            width: 30%;
            color: #aaaaaa;
            font-weight: normal;
            text-align: left;
            vertical-align: top;
        }
        .company-table td {
            color: #ffffff;
        }

        /* スマホ対応：画面が狭いときは表を縦並びにする */
        @media (max-width: 600px) {
            .company-table th, .company-table td {
                display: block;
                width: 100%;
                padding: 10px 0;
            }
            .company-table th {
                border-bottom: none;
                color: #888888;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">zeroONE</div>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Service</a></li>
                <li><a href="#">Company</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <section class="hero">
            <h1>zeroONE</h1>
            <p class="catchphrase">データと確実な運用体制で、ECビジネスを次のステージへ。</p>
        </section>

        <section class="company-section">
            <h2 class="section-title">Company</h2>
            <table class="company-table">
                <tbody>
                    <tr>
                        <th>会社名</th>
                        <td>株式会社zeroONE</td>
                    </tr>
                    <tr>
                        <th>設立</th>
                        <td>【〇〇年〇〇月】</td>
                    </tr>
                    <tr>
                        <th>代表取締役</th>
                        <td>【〇〇 〇〇】</td>
                    </tr>
                    <tr>
                        <th>所在地</th>
                        <td>〒000-0000<br>【東京都〇〇区〇〇...】</td>
                    </tr>
                    <tr>
                        <th>事業内容</th>
                        <td>Amazon DSP 2.0 運用代行<br>データ分析・戦略立案</td>
                    </tr>
                </tbody>
            </table>
        </section>

        <p style="text-align: center; color: #666; margin-top: 100px;">
            ※現在、ホームページ開設に向けて準備中です（2026年4月公開予定）
        </p>
    </div>

</body>
</html>
