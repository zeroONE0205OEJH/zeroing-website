<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>株式会社zeroONE | 公式サイト</title>
    <style>
        /* --- 全体設定 --- */
        body { background-color: #050505; color: #ffffff; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }

        /* --- ヘッダー --- */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 40px; background-color: rgba(5, 5, 5, 0.9); 
            position: fixed; top: 0; width: 100%; box-sizing: border-box; z-index: 1000; 
            backdrop-filter: blur(10px);
        }
        .logo svg { height: 50px; width: auto; }

        /* --- デスクトップナビ --- */
        nav.pc-nav ul { list-style: none; margin: 0; padding: 0; display: flex; gap: 30px; }
        nav.pc-nav a { color: #888; text-decoration: none; font-size: 14px; font-weight: bold; transition: 0.3s; }
        nav.pc-nav a:hover { color: #fff; }

        /* --- スマホ用ハンバーガーボタン（右上固定） --- */
        .hamburger { 
            display: none; cursor: pointer; flex-direction: column; gap: 6px; 
            z-index: 2001; position: relative;
        }
        .hamburger span { display: block; width: 28px; height: 2px; background-color: #ffffff; transition: 0.4s; }

        /* --- 真ん中にドカンと出るフルスクリーンメニュー --- */
        .mobile-menu {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: rgba(5, 5, 5, 0.98);
            display: flex; justify-content: center; align-items: center;
            z-index: 2000; opacity: 0; pointer-events: none; transition: 0.4s;
        }
        .mobile-menu.active { opacity: 1; pointer-events: auto; }
        .mobile-menu ul { list-style: none; padding: 0; text-align: center; }
        .mobile-menu li { margin: 30px 0; }
        .mobile-menu a { color: #fff; text-decoration: none; font-size: 28px; font-weight: bold; letter-spacing: 4px; transition: 0.3s; }

        /* --- メインビジュアル --- */
        .hero { height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .hero-video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; filter: brightness(0.6); }
        .hero-content { text-align: center; }
        .hero-content h1 { font-size: clamp(40px, 8vw, 80px); letter-spacing: 15px; font-weight: 200; margin: 0; }

        /* --- サービスセクション（写真のレイアウトを反映） --- */
        .services { padding: 100px 20px; max-width: 1100px; margin: 0 auto; }
        .service-item { 
            display: flex; align-items: center; gap: 50px; margin-bottom: 120px; 
            opacity: 0; transform: translateY(50px); transition: 1s;
        }
        .service-item.appear { opacity: 1; transform: translateY(0); }
        .service-item:nth-child(even) { flex-direction: row-reverse; }
        
        .service-img { width: 50%; border-radius: 8px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .service-img img { width: 100%; display: block; }
        
        .service-text { width: 45%; }
        .service-text h3 { font-size: 32px; border-left: 3px solid #fff; padding-left: 15px; margin-bottom: 10px; }
        .service-text p { color: #aaa; line-height: 1.8; margin-bottom: 25px; }
        
        /* 写真にあった「詳細を見る」ボタン */
        .btn-detail { 
            display: inline-block; padding: 12px 35px; border: 1px solid #fff; 
            color: #fff; text-decoration: none; font-size: 14px; transition: 0.3s; 
        }
        .btn-detail:hover { background: #fff; color: #000; }

        /* --- レスポンシブ --- */
        @media (max-width: 900px) {
            header { padding: 15px 25px; }
            nav.pc-nav { display: none; }
            .hamburger { display: flex; }
            
            /* ハンバーガーのアニメーション */
            .hamburger.active span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
            .hamburger.active span:nth-child(2) { opacity: 0; }
            .hamburger.active span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

            .service-item, .service-item:nth-child(even) { flex-direction: column; gap: 30px; }
            .service-img, .service-text { width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
                <defs><mask id="m"><rect width="200" height="150" fill="white"/><rect x="90" y="5" width="20" height="90" fill="black"/><polygon points="65,30 90,5 90,30" fill="black"/></mask></defs>
                <ellipse cx="100" cy="50" rx="35" ry="45" fill="white" mask="url(#m)"/>
                <text x="100" y="130" font-family="Arial" text-anchor="middle" font-size="28" fill="white">zero<tspan font-weight="bold">ONE</tspan></text>
            </svg>
        </div>
        
        <nav class="pc-nav">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="service.html">Service</a></li>
                <li><a href="company.html">Company</a></li>
                <li><a href="recruit.html">Recruit</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>

        <div class="hamburger" id="hamburger">
            <span></span><span></span><span></span>
        </div>
    </header>

    <div class="mobile-menu" id="mobile-menu">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="service.html">Service</a></li>
            <li><a href="company.html">Company</a></li>
            <li><a href="recruit.html">Recruit</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </div>

    <section class="hero">
        <video class="hero-video" autoplay loop muted playsinline>
            <source src="https://videos.pexels.com/video-files/3125396/3125396-uhd_2160_1440_25fps.mp4" type="video/mp4">
        </video>
        <div class="hero-content">
            <h1>zeroONE</h1>
        </div>
    </section>

    <section class="services">
        <div class="service-item">
            <div class="service-img"><img src="https://images.pexels.com/photos/4483610/pexels-photo-4483610.jpeg" alt="Logistics"></div>
            <div class="service-text">
                <h3>Logistics</h3>
                <p>ロジスティクス事業</p>
                <p>軽貨物運送を核とし、Amazon 2.0オフィシャルパートナーとして高品質な配送を提供。物流インフラを支えます。</p>
                <a href="service.html" class="btn-detail">詳細を見る</a>
            </div>
        </div>

        <div class="service-item">
            <div class="service-img"><img src="https://images.pexels.com/photos/3183150/pexels-photo-3183150.jpeg" alt="Creative"></div>
            <div class="service-text">
                <h3>Creative</h3>
                <p>動画編集・コンテンツ制作事業</p>
                <p>企業プロモーションからSNS動画まで。ゼロからONEを創り出す、心に響くストーリーテリングを提供します。</p>
                <a href="service.html" class="btn-detail">詳細を見る</a>
            </div>
        </div>
    </section>

    <script>
        // メニューの開閉
        const hamburger = document.getElementById('hamburger');
        const mobileMenu = document.getElementById('mobile-menu');

        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            mobileMenu.classList.toggle('active');
            // メニューが開いているときはスクロールさせない
            document.body.style.overflow = mobileMenu.classList.contains('active') ? 'hidden' : 'auto';
        });

        // スクロールアニメーション
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('appear');
            });
        }, { threshold: 0.2 });

        document.querySelectorAll('.service-item').forEach(el => observer.observe(el));
    </script>
</body>
</html>
