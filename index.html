<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>株式会社zeroONE | Amazon DSP 2.0 オフィシャルパートナー</title>
    <style>
        /* --- 全体設定 --- */
        html { scroll-behavior: smooth; }
        body {
            background-color: #111111;
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* --- ヘッダー --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background-color: rgba(26, 26, 26, 0.95);
            border-bottom: 1px solid #333333;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { font-size: 24px; font-weight: bold; letter-spacing: 2px; }
        nav ul { list-style: none; margin: 0; padding: 0; display: flex; gap: 30px; }
        nav a { color: #cccccc; text-decoration: none; font-size: 14px; transition: 0.3s; }
        nav a:hover { color: #ffffff; }

        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; }

        /* --- 共通見出し --- */
        .section-title {
            text-align: center;
            font-size: 28px;
            letter-spacing: 2px;
            margin-bottom: 50px;
            position: relative;
        }
        .section-title::after {
            content: ""; display: block; width: 40px; height: 2px; background: #ffffff; margin: 15px auto 0;
        }

        /* --- 1. Hero & News --- */
        .hero { text-align: center; padding: 120px 0 60px 0; }
        .hero h1 { font-size: 48px; letter-spacing: 4px; margin-bottom: 20px; }
        .hero p { color: #cccccc; font-size: 18px; }

        .news-section {
            max-width: 700px; margin: 0 auto 100px auto;
            background: #1a1a1a; padding: 15px 25px; border-radius: 4px; border: 1px solid #333;
        }
        .news-item { display: flex; gap: 20px; font-size: 14px; border-bottom: 1px solid #222; padding: 10px 0; }
        .news-item:last-child { border-bottom: none; }
        .news-date { color: #888; }

        /* --- 2. About --- */
        .about-section { padding: 100px 0; background-color: #0d0d0d; }
        .about-grid { display: flex; gap: 40px; align-items: center; }
        .about-text { flex: 1; }
        .about-text h3 { font-size: 22px; margin-bottom: 20px; color: #ffffff; }
        .about-text p { color: #aaaaaa; margin-bottom: 20px; }
        .feature-tag {
            display: inline-block; padding: 5px 15px; border: 1px solid #555;
            font-size: 12px; border-radius: 20px; margin-right: 10px; color: #888;
        }

        /* --- Service --- */
        .service-section { padding: 100px 0; }
        .service-grid { display: flex; gap: 20px; }
        .service-card {
            flex: 1; background: #1a1a1a; padding: 30px; border-radius: 8px; border: 1px solid #333;
        }
        .service-card h3 { font-size: 18px; margin-bottom: 15px; border-bottom: 1px solid #444; padding-bottom: 10px; }

        /* --- Company --- */
        .company-section { padding: 100px 0; }
        .company-table { width: 100%; border-collapse: collapse; max-width: 800px; margin: 0 auto; }
        .company-table th, .company-table td { padding: 20px; border-bottom: 1px solid #333333; }
        .company-table th { width: 30%; color: #aaaaaa; text-align: left; font-weight: normal; }

        /* --- 3. Contact (本格フォームUI) --- */
        .contact-section { padding: 100px 0; background: #1a1a1a; border-top: 1px solid #333; }
        .contact-form { max-width: 650px; margin: 0 auto; text-align: left; }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 14px; color: #cccccc; }
        
        /* 必須・任意のラベルデザイン */
        .req-label { background: #aa3333; color: #fff; font-size: 11px; padding: 3px 6px; border-radius: 3px; margin-left: 10px; vertical-align: middle; }
        .opt-label { background: #555555; color: #fff; font-size: 11px; padding: 3px 6px; border-radius: 3px; margin-left: 10px; vertical-align: middle; }
        
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 12px; background: #111111; border: 1px solid #444;
            color: #ffffff; border-radius: 4px; box-sizing: border-box; font-size: 15px;
        }
        .form-group textarea { height: 150px; resize: vertical; }
        
        /* チェックボックス部分 */
        .checkbox-group { display: flex; align-items: flex-start; gap: 10px; font-size: 14px; color: #aaa; margin-bottom: 30px; }
        .checkbox-group input[type="checkbox"] { width: auto; margin-top: 5px; transform: scale(1.2); }
        .checkbox-group a { color: #ffffff; text-decoration: underline; }

        .submit-btn {
            width: 100%; padding: 18px; background: #ffffff; color: #000000; border: none;
            font-weight: bold; border-radius: 4px; cursor: pointer; transition: 0.3s; font-size: 16px; letter-spacing: 1px;
        }
        .submit-btn:hover { background: #cccccc; }

        /* --- Footer --- */
        footer { padding: 60px 20px 20px 20px; text-align: center; border-top: 1px solid #222; background: #0a0a0a; }
        .footer-links { margin-bottom: 30px; }
        .footer-links a { color: #888; text-decoration: none; font-size: 13px; margin: 0 15px; }
        .copyright { color: #555; font-size: 12px; }

        @media (max-width: 768px) {
            .about-grid, .service-grid { flex-direction: column; }
            .hero h1 { font-size: 32px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">zeroONE</div>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#service">Service</a></li>
                <li><a href="#company">Company</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
