<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Service | 株式会社zeroONE</title>
    <style>
        /* --- 全体設定 --- */
        html { scroll-behavior: smooth; }
        body { background-color: #111111; color: #ffffff; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 0; line-height: 1.6; }
        
        /* --- ヘッダー --- */
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background-color: rgba(26, 26, 26, 0.95); border-bottom: 1px solid #333333; position: sticky; top: 0; z-index: 1000; }
        .logo svg { height: 60px; width: auto; }
        nav ul { list-style: none; margin: 0; padding: 0; display: flex; gap: 30px; }
        nav a { color: #cccccc; text-decoration: none; font-size: 14px; transition: 0.3s; }
        nav a:hover { color: #ffffff; }

        /* --- コンテナ設定 --- */
        .container { max-width: 1200px; margin: 0 auto; padding: 80px 20px; }
        .page-title { text-align: center; font-size: 32px; letter-spacing: 4px; margin-bottom: 60px; }
        
        /* --- サービスアイテム（交互レイアウト維持） --- */
        .service-item { display: flex; gap: 60px; margin-bottom: 120px; align-items: center; }
        .service-item:nth-child(even) { flex-direction: row-reverse; } /* 交互に反転 */
        
        .service-text { flex: 1; }
        .service-text h3 { font-size: 26px; margin-bottom: 25px; border-left: 5px solid #fff; padding-left: 20px; letter-spacing: 1px; }
        .service-text p { color: #aaaaaa; line-height: 2.0; font-size: 16px; margin-bottom: 20px; text-align: left; }
        .service-text p:last-child { margin-bottom: 0; }

        /* --- 画像エリア --- */
        .service-image { flex: 1; height: 350px; border-radius: 8px; overflow: hidden; border: 1px solid #333; background-color: #222; }
        .service-image img { width: 100%; height: 100%; object-fit: cover; object-position: center; transition: 0.5s; display: block; }
        .service-item:hover .service-image img { transform: scale(1.05); } /* ホバー時のエフェクト */

        /* --- フッター --- */
        footer { padding: 100px 20px 40px; text-align: center; border-top: 1px solid #222; background: #0a0a0a; display: flex; flex-direction: column; align-items: center; gap: 40px; }
        .footer-logo svg { height: 80px; width: auto; } 
        .footer-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; }
        .footer-links a { color: #888; text-decoration: none; font-size: 16px; transition: 0.3s; } 
        .footer-links a:hover { color: #fff; }
        .copyright { color: #555; font-size: 14px; margin-top: 20px; }

        /* --- スマホ対応 --- */
        @media (max-width: 900px) {
            .service-item { flex-direction: column !important; gap: 30px; margin-bottom: 80px; }
            .service-image { width: 100%; height: 250px; }
            .service-text h3 { font-size: 22px; }
            .service-text p { font-size: 15px; }
            header { padding: 15px 20px; }
            .logo svg { height: 50px; }
        }
    </style>
</head>

                    <tspan font-weight="400" fill="#ffffff">zero</tspan><tspan font-weight="800" fill="#ffffff">ONE</tspan>
